name: Release Native AirLLM

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux-release:
    name: Build Linux Native Binary
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install nuitka ordered-set zstandard
          python -m pip install -e ./air_llm

      - name: Build standalone binary
        env:
          PYTHON_BIN: python
        run: |
          chmod +x air_llm/scripts/build_native_standalone.sh
          make native-standalone

      - name: Package release archive
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          PLATFORM="linux-x86_64"
          make release-archive VERSION="${TAG_NAME}" PLATFORM="${PLATFORM}"
          sha256sum "dist/airllm-${TAG_NAME}-${PLATFORM}.tar.gz" > "dist/airllm-${TAG_NAME}-${PLATFORM}.sha256"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: airllm-${{ github.ref_name }}-linux-x86_64
          path: |
            dist/*.tar.gz
            dist/*.sha256

      - name: Publish GitHub Release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
          generate_release_notes: true
